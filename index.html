<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BOUND VISITOR</title>

<style>

body{
background:#000;
text-align:center;
padding-top:25px;
margin:0;
overflow-x:hidden;
font-family:
'Yu Mincho',
'Hiragino Mincho ProN',
'HGS明朝E',
serif;
}

.title{
color:#aa0000;
font-size:clamp(28px,6vw,48px);
margin-bottom:25px;
letter-spacing:2px;
}

.youare{
color:#990000;
font-size:clamp(18px,3vw,28px);
letter-spacing:6px;
margin-bottom:0;
}

#counter{
font-family:Arial,sans-serif;
font-size:min(140px,28vw);
font-weight:bold;
line-height:0.9;
color:#ff3333;

text-shadow:
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000,
0 0 80px #ff0000,
0 0 160px #ff0000;

animation:pulse 1.2s infinite alternate;
}

.bound{
color:#990000;
font-size:clamp(24px,6vw,48px);
letter-spacing:4px;
margin-top:-25px;
white-space:nowrap;
}

.info{
margin-top:0;
font-size:clamp(14px,3vw,20px);
line-height:1.4;
color:#880000;
}

@keyframes pulse{
from{
opacity:0.85;
}
to{
opacity:1;
}
}

</style>

</head>

<body>

<div class="title">
✝ 迷える仔羊たちへ ✝
</div>

<div class="youare">
YOU ARE THE
</div>

<div id="counter">
00000
</div>

<div class="bound">
BOUND VISITOR
</div>

<div class="info">
キリ番踏み逃げOK
<br>
報告はXにてお気軽に！
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBbLByJis7FdIf3uOuMNt7YKyZS9xZpPc",
authDomain: "akira15956-45399.firebaseapp.com",
projectId: "akira15956-45399",
storageBucket: "akira15956-45399.firebasestorage.app",
messagingSenderId: "149692658782",
appId: "1:149692658782:web:f26da6e6d387a1e647b0cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "counter", "visitors");

await updateDoc(ref,{
count:increment(1)
});

const snap = await getDoc(ref);

if(snap.exists()){
document.getElementById("counter").textContent =
String(snap.data().count).padStart(5,"0");
}

</script>

</body>
</html>
