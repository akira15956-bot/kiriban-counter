<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>CAPTURED VISITORS</title>
</head>

<body style="
background:#000;
text-align:center;
padding-top:40px;
overflow:hidden;
font-family:
'Yu Mincho',
'Hiragino Mincho ProN',
'HGS明朝E',
serif;
">

<div style="
color:#ff3333;
font-size:34px;
margin-bottom:50px;
text-shadow:
0 0 5px #ff0000,
0 0 15px #ff0000,
0 0 30px #ff0000,
0 0 60px #ff0000;
animation:pulse 2s infinite alternate;
">

✝ 迷える仔羊たちへ ✝

</div>

<div style="
color:#ff3333;
font-size:30px;
letter-spacing:4px;
text-shadow:
0 0 5px #ff0000,
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000,
0 0 80px #ff0000;
animation:pulse 1.5s infinite alternate;
">

YOU ARE THE

</div>

<div id="counter" style="
margin-top:20px;
font-family:Arial,sans-serif;
font-size:140px;
font-weight:bold;
color:#ff4444;
text-shadow:
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000,
0 0 80px #ff0000,
0 0 120px #ff0000,
0 0 200px #ff0000;
animation:pulse 0.8s infinite alternate;
">

00000

</div>

<div style="
margin-top:20px;
font-size:48px;
letter-spacing:6px;
color:#ff44ff;
text-shadow:
0 0 5px #ff00ff,
0 0 10px #ff00ff,
0 0 20px #ff00ff,
0 0 40px #ff00ff,
0 0 80px #ff00ff;
animation:pulse 1.5s infinite alternate;
">

BOUND VISITOR

</div>

<div style="
margin-top:60px;
font-size:24px;
line-height:2.2;
color:#ffff66;
text-shadow:
0 0 5px #ffff00,
0 0 10px #ffff00,
0 0 20px #ffff00,
0 0 40px #ffff00;
animation:pulse 2s infinite alternate;
">

キリ番踏み逃げOK

<br><br>

気が向いたらXのリプで教えてください

</div>

<style>
@keyframes pulse{
from{
opacity:0.85;
transform:scale(1);
}
to{
opacity:1;
transform:scale(1.04);
}
}
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbLByJis7FdIf3uOuMNt7YKyZS9xZpPc",
  authDomain: "akira15956-45399.firebaseapp.com",
  projectId: "akira15956-45399",
  storageBucket: "akira15956-45399.firebasestorage.app",
  messagingSenderId: "149692658782",
  appId: "1:149692658782:web:f26da6e6d387a1e647b0cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "counter", "visitors");

await updateDoc(ref, {
  count: increment(1)
});

const snap = await getDoc(ref);

if (snap.exists()) {
  document.getElementById("counter").textContent =
    String(snap.data().count).padStart(5, "0");
}
</script>
</body>
</html>
