<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>CAPTURED VISITORS</title>
</head>

<body style="
background:#000;
color:#ff0000;
text-align:center;
font-family:Arial;
padding-top:50px;
">

<h1>CAPTURED</h1>

<div id="counter" style="
font-size:72px;
text-shadow:
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000;
">

00000

</div>

<div style="
margin-top:20px;
letter-spacing:8px;
">

VISITORS

</div>

<p style="margin-top:40px;">
キリ番報告歓迎！
</p>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbLByJis7FdIf3uOuMNt7YKyZS9xZpPc",
  authDomain: "akira15956-45399.firebaseapp.com",
  projectId: "akira15956-45399",
  storageBucket: "akira15956-45399.firebasestorage.app",
  messagingSenderId: "149692658782",
  appId: "1:149692658782:web:f26da6e6d387a1e647b0cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "counter", "visitors");

await updateDoc(ref, {
  count: increment(1)
});

const snap = await getDoc(ref);

if (snap.exists()) {
  document.getElementById("counter").textContent =
    String(snap.data().count).padStart(5, "0");
}
</script>
</body>
</html>
