<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbLByJis7FdIf3uOuMNt7YKyZS9xZpPc",
  authDomain: "akira15956-45399.firebaseapp.com",
  projectId: "akira15956-45399",

  messagingSenderId: "149692658782",
  appId: "1:149692658782:web:f26da6e6d387a1e647b0cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "counter", "visitors");

await updateDoc(ref, {
  count: increment(1)
});

const snap = await getDoc(ref);

if (snap.exists()) {
  document.getElementById("counter").textContent =
    String(snap.data().count).padStart(5, "0");
}
